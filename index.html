<!DOCTYPE html>

<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Archipel Abandonné</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#050814;
color:white;
overflow-x:hidden;
min-height:100vh;
display:flex;
flex-direction:column;
}

/* BRUME */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:200%;
height:200%;
background:radial-gradient(circle,#0b1a3a 0%,#000 70%);
opacity:0.45;
animation:fogMove 60s linear infinite;
z-index:-2;
}

@keyframes fogMove{
0%{transform:translate(0,0);}
50%{transform:translate(-200px,-120px);}
100%{transform:translate(0,0);}
}

/* FLASH */

.flash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
z-index:5;
transition:opacity 0.15s;
}

/* ECLAIR SVG */

.lightning{
position:fixed;
top:-100px;
left:50%;
transform:translateX(-50%);
font-size:200px;
color:#a8d1ff;
opacity:0;
pointer-events:none;
z-index:6;
filter:drop-shadow(0 0 25px #6fb6ff);
}

/* YEUX */

.eyes{
position:fixed;
bottom:120px;
left:50%;
transform:translateX(-50%);
font-size:40px;
opacity:0;
z-index:3;
}

/* HEADER */

header{
text-align:center;
padding:90px 20px;
background:linear-gradient(90deg,#020617,#0b1a3a);
}

header h1{
font-size:55px;
animation:glitch 3s infinite;
}

@keyframes glitch{
0%{transform:skew(0deg);}
20%{transform:skew(2deg);}
40%{transform:skew(-2deg);}
60%{transform:skew(1deg);}
80%{transform:skew(-1deg);}
100%{transform:skew(0deg);}
}

header p{
color:#7aa2ff;
}

/* NAV */

nav{
text-align:center;
margin:25px 0;
}

nav a{
display:inline-block;
margin:8px;
padding:10px 25px;
background:#0b1a3a;
color:white;
border-radius:10px;
text-decoration:none;
transition:0.3s;
}

nav a:hover{
background:#1e3a8a;
transform:translateY(-3px);
}

/* MAIN */

main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:60px 20px;
}

.game-card{
background:#070d20;
border-radius:20px;
padding:35px;
max-width:420px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.9);
transition:0.4s;
}

.game-card:hover{
transform:translateY(-8px);
box-shadow:0 20px 50px rgba(30,58,138,0.8);
}

.placeholder-img{
height:200px;
background:#020617;
border-radius:15px;
margin-bottom:20px;
display:flex;
align-items:center;
justify-content:center;
color:#5a6aa8;
}

.btn{
display:inline-block;
padding:12px 35px;
background:#1e3a8a;
border-radius:10px;
text-decoration:none;
color:white;
transition:0.3s;
}

.btn:hover{
background:#3b82f6;
}

footer{
text-align:center;
padding:20px;
background:#020617;
color:#6a7dcf;
}

/* LAMPE TORCHE */

.flashlight{
pointer-events:none;
position:fixed;
top:0;
left:0;
width:260px;
height:260px;
border-radius:50%;
background:radial-gradient(circle, rgba(255,255,255,0.2) 0%, rgba(0,0,0,0.95) 70%);
mix-blend-mode:overlay;
transform:translate(-50%,-50%);
z-index:4;
}

/* PLUIE */

#rain{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:-1;
}

</style>

</head>

<body>

<div class="flash" id="flash"></div>

<div class="lightning" id="bolt">⚡</div>

<div class="eyes" id="eyes">👁 👁</div>

<canvas id="rain"></canvas>

<div class="flashlight" id="flashlight"></div>

<header>

<h1>Archipel Abandonné</h1>
<p>Un jeu d'horreur et de puzzles</p>

</header>

<nav>

<a href="index.html">Accueil</a> <a href="chap1.html">Chapitre 1</a> <a href="apropos.html">À propos</a> <a href="contact.html">Contact</a>

</nav>

<main>

<div class="game-card">

<div class="placeholder-img">
Image du jeu
</div>

<h2>Ile Abandonné (Chapitre 1)</h2>

<a href="chap1.html" class="btn">
En savoir +
</a>

</div>

</main>

<footer>

© 2026 Archipel Abandonné

</footer>

<script>

/* LAMPE TORCHE */

const light=document.getElementById("flashlight");

document.addEventListener("mousemove",e=>{
light.style.left=e.clientX+"px";
light.style.top=e.clientY+"px";
});

/* PLUIE */

const canvas=document.getElementById("rain");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let rainDrops=[];

for(let i=0;i<500;i++){
rainDrops.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
length:Math.random()*20
});
}

function rain(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.strokeStyle="#3b82f6";

for(let drop of rainDrops){

ctx.beginPath();
ctx.moveTo(drop.x,drop.y);
ctx.lineTo(drop.x,drop.y+drop.length);
ctx.stroke();

drop.y+=10;

if(drop.y>canvas.height){
drop.y=0;
drop.x=Math.random()*canvas.width;
}

}

}

setInterval(rain,30);

/* ECLAIRS + YEUX */

function lightning(){

const flash=document.getElementById("flash");
const bolt=document.getElementById("bolt");
const eyes=document.getElementById("eyes");

flash.style.opacity=1;
bolt.style.opacity=1;
eyes.style.opacity=1;

setTimeout(()=>{
flash.style.opacity=0;
bolt.style.opacity=0;
eyes.style.opacity=0;
},180);

}

function randomLightning(){

let delay=Math.random()*7000+2000;

setTimeout(()=>{

lightning();
randomLightning();

},delay);

}

randomLightning();

</script>

</body>
</html>
