<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archipel Abandonné</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Orbitron', sans-serif;
background:#111;
color:#fff;
margin:0;
padding:0;
display:flex;
flex-direction:column;
min-height:100vh;
}

/* HEADER */

header{
text-align:center;
padding:70px 20px;
background:linear-gradient(90deg,#ff4d4d,#ff9900);
}

header h1{
font-size:52px;
text-shadow:2px 2px 10px #000;
}

header p{
font-size:18px;
margin-top:10px;
}

/* NAVBAR */

nav{
text-align:center;
margin:20px 0;
}

nav a{
display:inline-block;
margin:0 10px;
padding:10px 25px;
background:#ff4d4d;
color:white;
border-radius:10px;
text-decoration:none;
font-size:16px;
transition:0.25s;
}

nav a:hover{
background:#ff9900;
transform:translateY(-3px);
}

/* MAIN */

main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:50px 20px;
}

/* CARD */

.game-card{
background:#1d1d1d;
border-radius:20px;
padding:30px;
max-width:400px;
width:100%;
text-align:center;
box-shadow:0 5px 20px rgba(255,77,77,0.35);
transition:0.35s;
}

.game-card:hover{
transform:translateY(-6px);
box-shadow:0 10px 30px rgba(255,153,0,0.6);
}

.placeholder-img{
width:100%;
height:180px;
background:#333;
border-radius:15px;
margin-bottom:20px;
display:flex;
align-items:center;
justify-content:center;
color:#777;
font-size:16px;
}

/* TITRE */

.game-card h2{
color:#ff4d4d;
margin-bottom:15px;
}

/* BOUTON */

.btn-info{
display:inline-block;
padding:12px 30px;
background:#ff4d4d;
color:white;
border-radius:10px;
text-decoration:none;
font-size:16px;
transition:0.25s;
}

.btn-info:hover{
background:#ff9900;
transform:translateY(-3px);
}

/* FOOTER */

footer{
text-align:center;
padding:15px;
background:#111;
color:#ff4d4d;
}

</style>
</head>

<body>

<header>
<h1>🔥 Archipel Abandonné 🔥</h1>
<p>Un jeu d'horreur et de puzzles</p>
</header>

<nav>

<a href="index.html">Accueil</a>
<a href="chap1.html">Chapitre 1</a>
<a href="contact.html">Contact</a>

</nav>

<main>

<div class="game-card">

<div class="placeholder-img">
Image du jeu
</div>

<h2>Ile Abandonné (Chapitre 1)</h2>

<a href="chap1.html" class="btn-info">
En savoir +
</a>

</div>

</main>

<footer>

© 2026 Archipel Abandonné

</footer>

</body>
</html>
