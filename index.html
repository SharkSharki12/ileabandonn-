<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Archipel Abandonné</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

/* BODY */

body{
font-family:'Orbitron',sans-serif;
background:#0a0a0a;
color:white;
margin:0;
padding:0;
display:flex;
flex-direction:column;
min-height:100vh;
overflow-x:hidden;
}

/* FOG ANIMATION */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:200%;
height:200%;
background:radial-gradient(circle,#222 0%,#000 70%);
opacity:0.35;
animation:fogMove 40s linear infinite;
z-index:-1;
}

@keyframes fogMove{
0%{transform:translate(0,0);}
50%{transform:translate(-200px,-100px);}
100%{transform:translate(0,0);}
}

/* HEADER */

header{
text-align:center;
padding:80px 20px;
background:linear-gradient(90deg,#ff3c3c,#ff9900);
}

/* GLITCH TITLE */

header h1{
font-size:55px;
position:relative;
text-shadow:0 0 15px #000;
animation:glitch 2s infinite;
}

@keyframes glitch{
0%{transform:skew(0deg);}
20%{transform:skew(2deg);}
40%{transform:skew(-2deg);}
60%{transform:skew(1deg);}
80%{transform:skew(-1deg);}
100%{transform:skew(0deg);}
}

header p{
font-size:18px;
margin-top:10px;
}

/* NAVBAR */

nav{
text-align:center;
margin:20px 0;
}

nav a{
display:inline-block;
margin:0 10px;
padding:10px 25px;
background:#ff3c3c;
color:white;
border-radius:10px;
text-decoration:none;
font-size:16px;
transition:0.25s;
}

nav a:hover{
background:#ff9900;
transform:translateY(-3px);
}

/* MAIN */

main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:60px 20px;
}

/* CARD */
/* CARD */
  
.game-card{
background:#151515;
border-radius:20px;
padding:35px;
max-width:420px;
width:100%;
text-align:center;
box-shadow:0 10px 30px rgba(255,70,70,0.4);
transition:0.35s;
}

.game-card:hover{
transform:translateY(-8px);
box-shadow:0 20px 40px rgba(255,150,0,0.7);
}

.placeholder-img{
width:100%;
height:190px;
background:#333;
border-radius:15px;
margin-bottom:20px;
display:flex;
align-items:center;
justify-content:center;
color:#777;
}

/* TITLE */

.game-card h2{
color:#ff4d4d;
margin-bottom:15px;
}

/* BUTTON */

.btn{
display:inline-block;
padding:12px 35px;
background:#ff3c3c;
color:white;
border-radius:10px;
text-decoration:none;
font-size:16px;
transition:0.25s;
}

.btn:hover{
background:#ff9900;
transform:translateY(-3px);
}

/* FOOTER */

footer{
text-align:center;
padding:15px;
background:#0a0a0a;
color:#ff4d4d;
}

/* MOBILE */

@media (max-width:700px){

header h1{
font-size:36px;
}

nav a{
margin:5px;
padding:8px 18px;
font-size:14px;
}

}

</style>

</head>

<body>
